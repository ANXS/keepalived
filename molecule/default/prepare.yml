---
- name: "Prepare nodes for keepalived testing"
  hosts: keepalived_nodes
  become: true
  tasks:
    - name: "Update apt cache"
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: "Install shellcheck"
      ansible.builtin.apt:
        pkg: "shellcheck"
        state: present
