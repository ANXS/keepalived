---
dependency:
  name: shell
  command: "true"

driver:
  name: docker

platforms:
  - name: "keepalived-node1-${MOLECULE_OS:-debian}-${MOLECULE_VERSION:-12}"
    image: "${MOLECULE_IMAGE:-geerlingguy/docker-debian12-ansible:latest}"
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    privileged: true
    pre_build_image: true
    cgroupns_mode: host
    command: ${MOLECULE_DOCKER_COMMAND:-""}
    capabilities:
      - NET_ADMIN
      - NET_BROADCAST
      - NET_RAW
    networks:
      - name: keepalived-test
    docker_networks:
      - name: keepalived-test
        driver: bridge
    etc_hosts:
      keepalived-node2: "172.28.0.3"
    groups:
      - keepalived_nodes
  - name: "keepalived-node2-${MOLECULE_OS:-debian}-${MOLECULE_VERSION:-12}"
    image: "${MOLECULE_IMAGE:-geerlingguy/docker-debian12-ansible:latest}"
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    privileged: true
    pre_build_image: true
    cgroupns_mode: host
    command: ${MOLECULE_DOCKER_COMMAND:-""}
    capabilities:
      - NET_ADMIN
      - NET_BROADCAST
      - NET_RAW
    networks:
      - name: keepalived-test
    etc_hosts:
      keepalived-node1: "172.28.0.2"
    groups:
      - keepalived_nodes

provisioner:
  name: ansible
  config_options:
    defaults:
      remote_tmp: /tmp/.ansible-${USER}/tmp/
  env:
    ANSIBLE_ROLES_PATH: "${MOLECULE_PROJECT_DIRECTORY}/..:${HOME}/.ansible/roles"

verifier:
  name: testinfra

scenario:
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - syntax
    - create
    - prepare
    - converge
    - idempotence
    - verify
    - cleanup
    - destroy
